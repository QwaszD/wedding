<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Свадьба Никиты и Ксении</title>

<style>
@font-face {
    font-family: 'Forum';
    src: url('Forum-Regular.woff2') format('woff2');
}
@font-face {
    font-family: 'AnastasiaScriptC';
    src: url('anastasiascriptc.woff2') format('woff2');
}

:root {
    --bg:#21283b;
    --accent:#b8a07c;
    --text:#fff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:'Forum',serif;
    background:var(--bg);
    color:var(--text);
    overflow-x:hidden;
    text-align:justify;
}

/* SKY CANVAS */
#sky{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
}

/* GLASS 2.0 */
.glass{
    background:rgba(33,40,59,.55);
    backdrop-filter:blur(14px) saturate(140%);
    border:1px solid rgba(184,160,124,.15);
    box-shadow:0 20px 60px rgba(0,0,0,.25);
    border-radius:20px;
}

/* HERO */
.hero{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    padding-top:10vh;
    position:relative;
    z-index:2;
}

.hero .container{
    width:90%;
    max-width:800px;
    padding:2rem;
}

.small-note{
    text-align:center;
    opacity:.9;
    margin-bottom:3rem;
}

h1{
    position:relative;
    height:260px;
}

.name-nikita,.name-kseniya,.name-and{
    font-family:'AnastasiaScriptC';
    color:var(--accent);
    position:absolute;
    opacity:0;
    animation:fadeIn 1.8s forwards;
}

.name-nikita{
    top:0;left:10%;
    font-size:5rem;
}

.name-kseniya{
    bottom:0;right:10%;
    font-size:5rem;
    animation-delay:.3s;
}

.name-and{
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    font-size:3rem;
    animation-delay:.2s;
}

@keyframes fadeIn{
    to{opacity:1;transform:translate(0)}
}

/* BUTTON / CARDS AURA */
.gold-aura{
    position:relative;
}
.gold-aura::after{
    content:"";
    position:absolute;
    inset:-20px;
    background:radial-gradient(circle,rgba(184,160,124,.25),transparent 70%);
    opacity:0;
    transition:.4s;
    pointer-events:none;
}
.gold-aura:hover::after{
    opacity:1;
}

/* TIMELINE */
.timeline{
    position:relative;
}
.timeline::before{
    content:"";
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:2px;
    background:var(--accent);
}

/* SVG DECOR */
svg.decor{
    position:absolute;
    bottom:-60px;
    left:50%;
    transform:translateX(-50%);
    width:600px;
    opacity:.4;
}

/* LOCATION */
.location,.wish-card,.rsvp-form,.calendar-mini,.timeline-content{
    background:rgba(33,40,59,.55);
    backdrop-filter:blur(14px);
    border:1px solid rgba(184,160,124,.15);
    border-radius:20px;
    padding:1.5rem;
}
</style>
</head>

<body>

<canvas id="sky"></canvas>

<section class="hero">
<div class="container glass gold-aura">

    <p class="small-note">
        Кажется, некоторые встречи происходят не случайно
    </p>

    <h1>
        <span class="name-nikita">Никита</span>
        <span class="name-and">&</span>
        <span class="name-kseniya">Ксения</span>
    </h1>

    <svg class="decor" viewBox="0 0 800 200">
        <path d="M0,100 Q200,0 400,100 T800,100"
              stroke="#b8a07c" fill="none"/>
    </svg>

</div>
</section>

<section class="timeline">
<div class="container glass gold-aura">
    <h2 style="text-align:center">Программа дня</h2>
</div>
</section>

<script>
/* =========================
   CANVAS SKY + CONSTELLATIONS
========================= */

const canvas=document.getElementById("sky");
const ctx=canvas.getContext("2d");

let w,h;
function resize(){
    w=canvas.width=innerWidth;
    h=canvas.height=innerHeight;
}
resize();
addEventListener("resize",resize);

const stars=Array.from({length:180},()=>({
    x:Math.random()*w,
    y:Math.random()*h,
    r:Math.random()*1.2,
    v:Math.random()*0.2+0.05
}));

const constellations=Array.from({length:5},()=>({
    pts:Array.from({length:4},()=>({
        x:Math.random()*w,
        y:Math.random()*h
    }))
}));

let mouse={x:0,y:0};

addEventListener("mousemove",(e)=>{
    mouse.x=(e.clientX-w/2)*0.02;
    mouse.y=(e.clientY-h/2)*0.02;
});

function draw(){
    ctx.clearRect(0,0,w,h);

    for(let s of stars){
        s.y+=s.v;
        if(s.y>h)s.y=0;

        ctx.fillStyle="rgba(255,255,255,.8)";
        ctx.beginPath();
        ctx.arc(s.x+mouse.x,s.y+mouse.y,s.r,0,Math.PI*2);
        ctx.fill();
    }

    ctx.strokeStyle="rgba(184,160,124,.25)";
    for(let c of constellations){
        ctx.beginPath();
        c.pts.forEach((p,i)=>{
            const x=p.x+mouse.x;
            const y=p.y+mouse.y;
            i?ctx.lineTo(x,y):ctx.moveTo(x,y);
            ctx.fillRect(x,y,2,2);
        });
        ctx.stroke();
    }

    requestAnimationFrame(draw);
}
draw();

/* =========================
   GOLD AURA
========================= */

document.querySelectorAll('.gold-aura')
.forEach(el=>el.classList.add('gold-aura'));

/* =========================
   PARALLAX HERO
========================= */

addEventListener("mousemove",(e)=>{
    const x=(e.clientX/innerWidth-.5)*10;
    const y=(e.clientY/innerHeight-.5)*10;
    document.querySelector(".hero").style.transform=
        `translate(${x}px,${y}px)`;
});
</script>

</body>
</html>
